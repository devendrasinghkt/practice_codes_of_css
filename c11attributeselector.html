<html>
    <head>
        <title>attribute selector </title>
        <style>
            input[type="submit"]{
                background-color: aqua;
                color: blue;
            }
            a[href^="https"]{
                background-color: rgb(164, 28, 169);
                color: rgb(26, 179, 64);
            }
        </style>
    </head>
    <body>
         <div>
            <p >First Child </p>
            <p>Second Child</p>
            <span>This is span</span><br><br>
            <a href="https://www.w3schools.com/css/">www.css.com</a>
            <div>
                <p>Nested Child</p>
            </div>
            <input type="submit" value="submit" >
        </div>
    </body>
</html>
