<!DOCTYPE html>
<html>
<head>
    <title>CSS Border Example</title>

    <style>

        /* Shorthand Border */
        .box1{
            border: 3px solid blue;
            padding: 10px;
            margin: 10px;
        }

        /* Longhand Border */
        .box2{
            border-width: 4px;
            border-style: dashed;
            border-color: red;
            padding: 10px;
            margin: 10px;
        }

        /* Different Border Styles */
        .box3{
            border: 4px dotted green;
            padding: 10px;
            margin: 10px;
        }

        .box4{
            border: 6px double purple;
            padding: 10px;
            margin: 10px;
        }

    </style>
</head>
<body>

    <!-- Shorthand -->
    <div class="box1">
        Shorthand Border
    </div>

    <!-- Longhand -->
    <div class="box2">
        Longhand Border
    </div>

    <!-- Dotted -->
    <div class="box3">
        Dotted Border
    </div>

    <!-- Double -->
    <div class="box4">
        Double Border
    </div>

</body>
</html>
