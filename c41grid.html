<!DOCTYPE html>
<html>
<head>
    <title>CSS Grid Practical Example</title>

    <style>

        /* Grid Container */
        .container{
            display: grid;

            /* Create 3 equal columns */
            grid-template-columns: repeat(3, 1fr);

            /* Height of each row */
            grid-template-rows: 100px 100px 100px;

            /* Space between items */
            gap: 10px;

            border: 2px solid black;
            padding: 10px;
        }

        /* Grid Items */
        .item{
            background-color: lightblue;
            border: 2px solid blue;
            text-align: center;
            line-height: 100px;
            font-size: 20px;
        }

        /* Item 1 occupies two columns */
        .item1{
            grid-column: 1 / 3;
        }

        /* Item 4 occupies two rows */
        .item4{
            grid-row: 2 / 4;
        }

    </style>

</head>
<body>

    <h2>CSS Grid Practical Layout</h2>

    <div class="container">

        <div class="item item1">1</div>

        <div class="item">2</div>

        <div class="item item4">3</div>

        <div class="item">4</div>

        <div class="item">5</div>

        <div class="item">6</div>

        <div class="item">7</div>

    </div>

</body>
</html>
