<!DOCTYPE html>
<html>
<head>
    <title>CSS Color Properties Example</title>

    <style>

        /* Color using color name */
        .color-name{
            color: red;
        }

        /* Color using RGB */
        .rgb{
            color: rgb(0, 128, 255);
        }

        /* Color using HEX */
        .hex{
            color: #28a745;
        }

        /* Color using HSL */
        .hsl{
            color: hsl(300, 100%, 40%);
        }

        /* Background color example */
        .background{
            background-color: lightyellow;
            padding: 10px;
        }

        /* Border color example */
        .border{
            border: 3px solid blue;
            padding: 10px;
        }

    </style>
</head>
<body>

    <!-- Color Name -->
    <h2 class="color-name">
        This text uses a Color Name
    </h2>

    <!-- RGB Color -->
    <h2 class="rgb">
        This text uses RGB Color
    </h2>

    <!-- HEX Color -->
    <h2 class="hex">
        This text uses HEX Color
    </h2>

    <!-- HSL Color -->
    <h2 class="hsl">
        This text uses HSL Color
    </h2>

    <!-- Background Color -->
    <p class="background">
        This paragraph has a background color.
    </p>

    <!-- Border Color -->
    <p class="border">
        This paragraph has a colored border.
    </p>

</body>
</html>
