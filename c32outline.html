<!DOCTYPE html>
<html>
<head>
    <title>CSS Outline Example</title>

    <style>

        /* Basic Outline */
        .box1{
            border: 2px solid black;
            outline: 3px solid red;
            padding: 15px;
            margin: 20px;
        }

        /* Dashed Outline */
        .box2{
            border: 2px solid black;
            outline: 4px dashed blue;
            padding: 15px;
            margin: 20px;
        }

        /* Outline with Offset */
        .box3{
            border: 2px solid black;
            outline: 4px solid green;
            outline-offset: 10px;
            padding: 15px;
            margin: 30px;
        }

    </style>
</head>
<body>

    <!-- Basic Outline -->
    <div class="box1">
        Solid Red Outline
    </div>

    <!-- Dashed Outline -->
    <div class="box2">
        Dashed Blue Outline
    </div>

    <!-- Outline Offset -->
    <div class="box3">
        Outline with Offset
    </div>

</body>
</html>
