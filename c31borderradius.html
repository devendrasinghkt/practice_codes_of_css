<!DOCTYPE html>
<html>
<head>
    <title>Border Radius Example</title>

    <style>

        /* Normal square box */
        .box1{
            width: 150px;
            height: 100px;
            border: 3px solid blue;
            margin: 10px;
        }

        /* Rounded corners on all sides */
        .box2{
            width: 150px;
            height: 100px;
            border: 3px solid green;
            border-radius: 20px;
            margin: 10px;
        }

        /* Different radius for each corner */
        .box3{
            width: 150px;
            height: 100px;
            border: 3px solid red;
            border-radius: 20px 40px 10px 30px;
            margin: 10px;
        }

        /* Circle */
        .circle{
            width: 120px;
            height: 120px;
            border: 3px solid purple;
            border-radius: 50%;
            margin: 10px;
        }

    </style>
</head>
<body>

    <!-- Square -->
    <div class="box1">Square Box</div>

    <!-- Rounded -->
    <div class="box2">Rounded Box</div>

    <!-- Different Corners -->
    <div class="box3">Custom Radius</div>

    <!-- Circle -->
    <div class="circle"></div>

</body>
</html>
