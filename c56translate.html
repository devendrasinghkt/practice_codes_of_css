<!DOCTYPE html>
<html>
<head>
    <title>CSS Transform Example</title>

    <style>

        body{
            display:flex;
            gap:30px;
            flex-wrap:wrap;
            padding:30px;
        }

        /* Common Box Style */
        .box{
            width:120px;
            height:120px;
            background:skyblue;
            border:2px solid blue;

            display:flex;
            justify-content:center;
            align-items:center;

            transition:0.5s;
        }

        /* Move */
        .translate:hover{
            transform:translate(30px,20px);
        }

        /* Rotate */
        .rotate:hover{
            transform:rotate(45deg);
        }

        /* Scale */
        .scale:hover{
            transform:scale(1.3);
        }

        /* Skew */
        .skew:hover{
            transform:skew(20deg);
        }

        /* Multiple Transform */
        .multiple:hover{
            transform:translateY(-20px) rotate(20deg) scale(1.2);
        }

    </style>

</head>
<body>

<div class="box translate">Translate</div>

<div class="box rotate">Rotate</div>

<div class="box scale">Scale</div>

<div class="box skew">Skew</div>

<div class="box multiple">Multiple</div>

</body>
</html>
