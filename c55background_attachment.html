<!DOCTYPE html>
<html>
<head>
    <title>background-attachment Example</title>

    <style>

        body{
            margin:0;
        }

        /* Background Section */
        .section{

            height:500px;

            background-image:url("https://picsum.photos/1200/800");

            background-repeat:no-repeat;

            background-size:cover;

            background-position:center;

            /* Change this value */
            background-attachment:fixed;

            color:white;
            font-size:40px;
            text-align:center;
            line-height:500px;
        }

        .content{
            height:600px;
            padding:30px;
        }

    </style>

</head>
<body>

<div class="section">
    Background Attachment
</div>

<div class="content">
    Scroll the page to see the effect.
</div>

</body>
</html>
