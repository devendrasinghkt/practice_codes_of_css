<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Shadow Example</title>

    <style>

        /* Simple text shadow */
        .shadow1{
            text-shadow: 2px 2px 3px gray;
        }

        /* Red shadow */
        .shadow2{
            text-shadow: 3px 3px 5px red;
        }

        /* Blue glowing effect */
        .shadow3{
            text-shadow: 0px 0px 10px blue;
        }

        /* Multiple shadows */
        .shadow4{
            text-shadow: 2px 2px 2px gray,
             4px 4px 4px lightblue;
        }

    </style>
</head>
<body>

    <!-- Normal text without shadow -->
    <h2>Normal Text</h2>

    <!-- Simple shadow -->
    <h2 class="shadow1">
        Simple Shadow
    </h2>

    <!-- Red shadow -->
    <h2 class="shadow2">
        Red Shadow Effect
    </h2>

    <!-- Glow effect -->
    <h2 class="shadow3">
        Blue Glow Effect
    </h2>

    <!-- Multiple shadows -->
    <h2 class="shadow4">
        Multiple Shadows
    </h2>

</body>
</html>
