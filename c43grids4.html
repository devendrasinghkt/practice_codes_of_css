<!DOCTYPE html>
<html>
<head>
    <title>Grid Template Areas Example</title>

    <style>

        /* Grid Container */
        .container{

            display: grid;

            /* Create 3 columns */
            grid-template-columns: 200px 1fr 200px;

            /* Create 3 rows */
            grid-template-rows: 80px 300px 80px;

            /* Name each grid area */
            grid-template-areas:
                "header header header"
                "sidebar main ads"
                "footer footer footer";

            gap: 10px;
        }

        /* Common style */
        .item{
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 20px;
        }

        /* Assign area names */

        .header{
            grid-area: header;
            background: royalblue;
        }

        .sidebar{
            grid-area: sidebar;
            background: tomato;
        }

        .main{
            grid-area: main;
            background: seagreen;
        }

        .ads{
            grid-area: ads;
            background: orange;
        }

        .footer{
            grid-area: footer;
            background: gray;
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="item header">Header</div>

        <div class="item sidebar">Sidebar</div>

        <div class="item main">Main Content</div>

        <div class="item ads">Ads</div>

        <div class="item footer">Footer</div>

    </div>

</body>
</html>
